name: Kelp CI and Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run cargo test
        run: cargo test --locked

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  publish-dry-run:
    name: Publish Dry Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo publish dry run
        run: cargo publish --dry-run --locked

  package-smoke:
    name: Package Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check installer shell syntax
        run: bash -n installer.sh
      - name: Check packaging shell syntax
        run: bash -n scripts/package-release.sh
      - name: Build release artifacts
        run: ./scripts/package-release.sh "$RUNNER_TEMP/kelp-dist"
      - name: Verify expected artifacts
        run: |
          test -f "$RUNNER_TEMP/kelp-dist/kelp.rb"
          test -f Formula/kelp.rb
          ls -1 "$RUNNER_TEMP/kelp-dist"

  release-source:
    name: Release Source And Linux Artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - test
      - lint
      - publish-dry-run
      - package-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build packaged artifacts
        run: ./scripts/package-release.sh "$RUNNER_TEMP/kelp-dist"
      - name: Publish release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/kelp-dist/*.tar.gz
            ${{ runner.temp }}/kelp-dist/*.sha256
            ${{ runner.temp }}/kelp-dist/kelp.rb

  release-macos:
    name: Release macOS Archive
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - test
      - lint
      - publish-dry-run
      - package-smoke
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release --locked
      - name: Package archive
        shell: bash
        run: |
          VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          TARGET_TRIPLE="$(rustc -vV | sed -n 's/^host: //p')"
          PACKAGE_ROOT="$RUNNER_TEMP/kelp-v$VERSION-$TARGET_TRIPLE"
          ARCHIVE_PATH="$RUNNER_TEMP/kelp-v$VERSION-$TARGET_TRIPLE.tar.gz"
          CHECKSUM_PATH="$ARCHIVE_PATH.sha256"
          mkdir -p "$PACKAGE_ROOT/completions"
          ./target/release/kelp completions bash > "$PACKAGE_ROOT/completions/kelp.bash"
          ./target/release/kelp completions zsh > "$PACKAGE_ROOT/completions/_kelp"
          ./target/release/kelp completions fish > "$PACKAGE_ROOT/completions/kelp.fish"
          cp target/release/kelp "$PACKAGE_ROOT/kelp"
          cp README2.md "$PACKAGE_ROOT/README2.md"
          cp LICENSE "$PACKAGE_ROOT/LICENSE"
          tar -C "$RUNNER_TEMP" -czf "$ARCHIVE_PATH" "$(basename "$PACKAGE_ROOT")"
          printf '%s  %s\n' "$(shasum -a 256 "$ARCHIVE_PATH" | awk '{print $1}')" "$(basename "$ARCHIVE_PATH")" > "$CHECKSUM_PATH"
      - name: Publish release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/kelp-v*.tar.gz
            ${{ runner.temp }}/kelp-v*.sha256

  release-windows:
    name: Release Windows Archive
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - test
      - lint
      - publish-dry-run
      - package-smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release --locked
      - name: Package archive
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.*)"$').Matches[0].Groups[1].Value
          $target = (rustc -vV | Select-String '^host: (.*)$').Matches[0].Groups[1].Value
          $packageRoot = Join-Path $env:RUNNER_TEMP "kelp-v$version-$target"
          $archivePath = Join-Path $env:RUNNER_TEMP "kelp-v$version-$target.zip"
          $checksumPath = "$archivePath.sha256"
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          Copy-Item target/release/kelp.exe "$packageRoot/kelp.exe"
          Copy-Item README2.md "$packageRoot/README2.md"
          Copy-Item LICENSE "$packageRoot/LICENSE"
          Compress-Archive -Path "$packageRoot/*" -DestinationPath $archivePath
          $hash = (Get-FileHash -Algorithm SHA256 $archivePath).Hash.ToLower()
          "$hash  $(Split-Path $archivePath -Leaf)" | Set-Content $checksumPath
      - name: Publish release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/kelp-v*.zip
            ${{ runner.temp }}/kelp-v*.sha256
